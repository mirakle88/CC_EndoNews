name: EndoNews Weekly

on:
  schedule:
    # Chaque lundi à 7h00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:  # Permet le lancement manuel

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch articles from PubMed
        run: python fetch_articles.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true
